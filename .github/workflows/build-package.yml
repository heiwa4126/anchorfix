name: Build Python Package

on:
  workflow_call:
    outputs:
      package-built:
        description: "Whether the package was successfully built"
        value: ${{ jobs.build.outputs.package-built }}

jobs:
  build:
    name: Build Python distribution packages
    runs-on: ubuntu-latest
    outputs:
      package-built: ${{ steps.build.outputs.package-built }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6-beta
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # Note: v6 may cause issues with nektos/act due to missing shims

      - name: Set up Python environment
        run: uv python install

      - name: Build distribution packages
        id: build
        run: |
          # uv build
          if uv run poe build; then
            echo "package-built=true" >> "$GITHUB_OUTPUT"
          else
            echo "package-built=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # # Verify that the built packages work correctly
      # - name: Test wheel installation
      #   run: uv run --isolated --no-project --with dist/*.whl anchorfix

      # - name: Test source distribution installation
      #   run: uv run --isolated --no-project --with dist/*.tar.gz anchorfix

      - name: Upload built packages as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 1
